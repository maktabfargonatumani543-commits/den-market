<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dwen Market | Zamonaviy Do‘kon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--tg-theme-bg-color, #0a0f1c);
            color: var(--tg-theme-text-color, #ffffff);
            transition: background 0.3s, color 0.3s;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* Glassmorphism card */
        .glass-card {
            background: rgba(var(--tg-theme-secondary-bg-color-rgb, 255,255,255), 0.1);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.25s ease;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 12px 0;
        }
        .logo {
            font-size: 4rem;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffb347, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* Menu grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        /* Product card */
        .product-card {
            background: rgba(var(--tg-theme-secondary-bg-color-rgb, 30,30,40), 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 14px 12px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .product-card:active {
            transform: scale(0.97);
        }
        .product-emoji {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .product-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .product-price {
            font-size: 0.85rem;
            color: #ffb347;
            font-weight: 600;
        }
        .quantity-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .qty-btn {
            background: var(--tg-theme-button-color, #ffffff);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--tg-theme-button-text-color, #000);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .qty-btn:active {
            transform: scale(0.92);
        }
        .qty-value {
            font-size: 1.2rem;
            font-weight: 600;
            min-width: 32px;
        }

        /* Cart section */
        .cart-section {
            background: rgba(var(--tg-theme-secondary-bg-color-rgb, 20,20,30), 0.7);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 20px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .cart-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .cart-items {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .cart-item-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cart-item-price {
            font-weight: 600;
            color: #ffb347;
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-item-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 1rem;
        }
        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-top: 2px solid rgba(255,255,255,0.2);
            font-size: 1.2rem;
            font-weight: 700;
        }
        .total-amount {
            color: #ffb347;
            font-size: 1.4rem;
        }

        /* Inputs */
        .input-group {
            margin: 16px 0;
        }
        .input-label {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 6px;
            display: block;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            color: var(--tg-theme-text-color, #fff);
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus, textarea:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 0 2px #ffb347;
        }
        textarea {
            border-radius: 24px;
            resize: vertical;
        }

        /* Empty cart */
        .empty-cart {
            text-align: center;
            padding: 20px;
            opacity: 0.6;
        }

        footer {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 24px;
            opacity: 0.5;
        }

        /* Custom scroll */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb347;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🛍️✨</div>
        <div class="title">DWEN MARKET</div>
        <div class="subtitle">Faqat sifatli mahsulotlar · Tez yetkazib berish</div>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-section">
        <div class="cart-header">
            🛒 <span>Savatcha</span>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">Savatcha bo'sh</div>
        </div>
        <div class="total">
            <span>💰 Jami</span>
            <span class="total-amount" id="totalAmount">0 so'm</span>
        </div>

        <div class="input-group">
            <div class="input-label">📞 Telefon raqam</div>
            <input type="tel" id="phone" placeholder="+998 __ ___ __ __">
        </div>

        <div class="input-group">
            <div class="input-label">📍 Yetkazib berish manzili</div>
            <textarea id="address" rows="2" placeholder="Ko'cha, uy, tuman, shahar..."></textarea>
        </div>
    </div>

    <footer>Dwen Market 2026 | Sifat kafolati</footer>

    <script>
        // ========= YANGI MAHSULOTLAR (faqat siz bergan ro'yxat) =========
        const MENU = {
            "🥔 Kartoshka": { price: 7000, emoji: "🥔" },
            "🧅 Piyoz": { price: 2000, emoji: "🧅" },
            "🥕 Sabzi qizil": { price: 4000, emoji: "🥕" },
            "🥕 Sabzi sariq": { price: 3300, emoji: "🥕" },
            "🍚 Guruch Xorazm Lazer": { price: 14000, emoji: "🍚" },
            "🍚 Guruch Rishton Lazer": { price: 13000, emoji: "🍚" },
            "🧂 Tuz Roxat": { price: 5000, emoji: "🧂" },
            "🍃 Kok Choy (0.5kg)": { price: 20000, emoji: "🍃" },
            "🫒 Donya yog' (5L)": { price: 100000, emoji: "🫒" },
            "🫒 Farg'ona yog' (3.6kg)": { price: 68000, emoji: "🫒" },
            "🫒 Lazzat yog' (5L)": { price: 100000, emoji: "🫒" }
        };

        let cart = {};
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.MainButton.hide();

        // Set theme colors to CSS variables
        const root = document.documentElement;
        if (tg.themeParams) {
            root.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#0a0f1c');
            root.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#ffffff');
            root.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#ffb347');
            root.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#000000');
            const bgRGB = tg.themeParams.bg_color ? hexToRgb(tg.themeParams.bg_color) : '10,15,28';
            root.style.setProperty('--tg-theme-secondary-bg-color-rgb', bgRGB);
        }

        function hexToRgb(hex) {
            let c = hex.substring(1);
            if (c.length === 3) c = c.split('').map(ch => ch+ch).join('');
            const intVal = parseInt(c, 16);
            return `${(intVal >> 16) & 255}, ${(intVal >> 8) & 255}, ${intVal & 255}`;
        }

        function renderMenu() {
            const container = document.getElementById('menuGrid');
            container.innerHTML = '';
            for (const [name, data] of Object.entries(MENU)) {
                const idSafe = name.replace(/\s/g, '').replace(/[()]/g, '');
                container.innerHTML += `
                    <div class="product-card" data-name="${name.replace(/[\\"']/g, '')}">
                        <div class="product-emoji">${data.emoji}</div>
                        <div class="product-name">${name}</div>
                        <div class="product-price">${data.price.toLocaleString()} so'm</div>
                        <div class="quantity-selector">
                            <button class="qty-btn" data-name="${name.replace(/[\\"']/g, '')}" data-delta="-1">−</button>
                            <span class="qty-value" id="qty-${idSafe}">${cart[name] || 0}</span>
                            <button class="qty-btn" data-name="${name.replace(/[\\"']/g, '')}" data-delta="1">+</button>
                        </div>
                    </div>
                `;
            }
            // Add event listeners for quantity buttons
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const name = btn.getAttribute('data-name');
                    const delta = parseInt(btn.getAttribute('data-delta'));
                    changeQty(name, delta);
                });
            });
            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        const name = card.getAttribute('data-name');
                        changeQty(name, 1);
                    }
                });
            });
        }

        function changeQty(name, delta) {
            let current = cart[name] || 0;
            let newVal = current + delta;
            if (newVal < 0) newVal = 0;
            if (newVal === 0) delete cart[name];
            else cart[name] = newVal;
            
            const idSafe = name.replace(/\s/g, '').replace(/[()]/g, '');
            const span = document.getElementById(`qty-${idSafe}`);
            if (span) span.innerText = cart[name] || 0;
            updateCart();
            updateMainButton();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            let total = 0;
            
            if (Object.keys(cart).length === 0) {
                cartDiv.innerHTML = '<div class="empty-cart">Savatcha bo\'sh</div>';
                document.getElementById('totalAmount').innerHTML = '0 so\'m';
                return;
            }
            
            cartDiv.innerHTML = '';
            for (const [item, qty] of Object.entries(cart)) {
                const sum = MENU[item].price * qty;
                total += sum;
                cartDiv.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-name">
                            <span>${MENU[item].emoji}</span>
                            <span style="font-size:0.85rem;">${item} x${qty}</span>
                        </div>
                        <div class="cart-item-controls">
                            <span class="cart-item-price">${sum.toLocaleString()} so'm</span>
                            <button class="cart-item-btn" data-item="${item.replace(/[\\"']/g, '')}" data-delta="-1">−</button>
                            <button class="cart-item-btn" data-item="${item.replace(/[\\"']/g, '')}" data-delta="1">+</button>
                        </div>
                    </div>
                `;
            }
            document.getElementById('totalAmount').innerHTML = total.toLocaleString() + ' so\'m';
            
            // Attach cart item events
            document.querySelectorAll('.cart-item-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const item = btn.getAttribute('data-item');
                    const delta = parseInt(btn.getAttribute('data-delta'));
                    changeQty(item, delta);
                });
            });
        }

        function updateMainButton() {
            if (Object.keys(cart).length > 0) {
                tg.MainButton.setText("✅ Buyurtma berish");
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        async function sendOrder() {
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            if (Object.keys(cart).length === 0) {
                tg.showPopup({ title: "❌ Xatolik", message: "Mahsulot tanlang!" });
                return;
            }
            if (!phone || phone.length < 9) {
                tg.showPopup({ title: "❌ Xatolik", message: "Telefon raqam kiriting!" });
                return;
            }
            if (!address || address.length < 5) {
                tg.showPopup({ title: "❌ Xatolik", message: "Yetkazib berish manzilini kiriting!" });
                return;
            }
            
            const total = Object.entries(cart).reduce((s, [i,q]) => s + MENU[i].price * q, 0);
            const orderData = {
                cart: cart,
                total: total,
                phone: phone,
                address: address,
                date: new Date().toLocaleString()
            };
            
            tg.MainButton.showProgress();
            tg.sendData(JSON.stringify(orderData));
            tg.showPopup({ title: "✅ Buyurtma qabul qilindi!", message: "Operator siz bilan tez orada bog'lanadi." });
            tg.MainButton.hideProgress();
            tg.close();
        }

        tg.MainButton.onClick(sendOrder);
        renderMenu();
        updateCart();
        tg.setHeaderColor("bg_color");
    </script>
</body>
</html>
