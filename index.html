<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dwen Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0f1c; color: white; padding: 20px; font-family: system-ui; }
        .box { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .qty-box { display: flex; gap: 12px; align-items: center; }
        button { background: #ffb347; border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: none; background: rgba(255,255,255,0.2); color: white; }
        .order-btn { width: 100%; background: #ffb347; color: black; margin-top: 20px; }
        .cart-item { background: rgba(0,0,0,0.3); margin: 5px 0; padding: 8px; border-radius: 12px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <h2>🛍 DWEN MARKET</h2>
    <div id="products"></div>
    <h3>🛒 Savatcha</h3>
    <div id="cart"></div>
    <div id="total">Jami: 0 so'm</div>
    <input id="phone" placeholder="📞 Telefon" type="tel">
    <textarea id="address" placeholder="📍 Manzil"></textarea>
    <button id="order" class="order-btn">✅ Buyurtma berish</button>
    <script>
        const MAHSULOTLAR = {
            "Kartoshka":7000,"Piyoz":2000,"🥕Sabzi qizil":4000,"🥕Sabzi sariq":3300,
            "🍚Guruch Xorazm Lazer":14000,"🍚Guruch Rishton Lazer":13000,"🧂Tuz Roxat":5000,
            "🍃Kok Choy (0.5kg)":20000,"Donya yog' (5L)":100000,"Farg'ona yog' (3.6kg)":68000,"Lazzat yog' (5L)":100000
        };
        let savat = {};
        const tg = window.Telegram.WebApp; tg.expand();

        function render() {
            let html = '';
            for (let [n, p] of Object.entries(MAHSULOTLAR)) {
                html += `<div class="box">
                            <div><strong>${n}</strong><br>${p.toLocaleString()} so'm</div>
                            <div class="qty-box">
                                <button onclick="chang('${n}',-1)">−</button>
                                <span id="c-${n.replace(/\s/g,'')}">${savat[n]||0}</span>
                                <button onclick="chang('${n}',1)">+</button>
                            </div>
                        </div>`;
            }
            document.getElementById('products').innerHTML = html;
        }
        window.chang = function(n,d){ let cur=savat[n]||0, nv=cur+d; if(nv<=0) delete savat[n]; else savat[n]=nv; document.getElementById(`c-${n.replace(/\s/g,'')}`).innerText=savat[n]||0; update(); };
        function update(){
            let total=0, html='';
            for(let [n,q] of Object.entries(savat)){ let s=MAHSULOTLAR[n]*q; total+=s; html+=`<div class="cart-item"><span>${n} x${q}</span><span>${s.toLocaleString()} so'm</span></div>`; }
            document.getElementById('cart').innerHTML=html||'Bo\'sh';
            document.getElementById('total').innerHTML=`Jami: ${total.toLocaleString()} so'm`;
        }
        document.getElementById('order').onclick=()=>{
            let phone=document.getElementById('phone').value.trim();
            let address=document.getElementById('address').value.trim();
            if(Object.keys(savat).length===0){ tg.showPopup({title:"Xatolik",message:"Mahsulot tanlang"}); return; }
            if(!phone){ tg.showPopup({title:"Xatolik",message:"Telefon raqam kerak"}); return; }
            if(!address){ tg.showPopup({title:"Xatolik",message:"Manzil kerak"}); return; }
            let items=[], total=0;
            for(let [n,q] of Object.entries(savat)){ let p=MAHSULOTLAR[n]; let s=p*q; total+=s; items.push({name:n,qty:q,price:p,total:s}); }
            tg.sendData(JSON.stringify({cart:items,total:total,phone:phone,address:address,date:new Date().toLocaleString()}));
            tg.showPopup({title:"✅ Qabul qilindi",message:"Operator bog'lanadi"});
            tg.close();
        };
        render(); update();
    </script>
</body>
</html>
