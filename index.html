<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dwen Market | Do‘kon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: var(--tg-theme-bg-color, #0a0f1c);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 16px;
            padding-bottom: 100px;
        }
        .sarlavha { text-align: center; margin-bottom: 24px; }
        .logo { font-size: 4rem; animation: suzish 3s ease-in-out infinite; }
        @keyframes suzish { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
        .nomi { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #fff, #ffb347, #ff6b6b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tagline { font-size: 0.8rem; opacity: 0.7; }
        .mahsulotlar-tarmoq { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
        .karta { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 24px; padding: 14px 12px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s; }
        .karta:active { transform: scale(0.97); }
        .mahsulot-emoji { font-size: 2.5rem; margin-bottom: 8px; }
        .mahsulot-nomi { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
        .mahsulot-narxi { font-size: 0.85rem; color: #ffb347; font-weight: 600; }
        .son-tanlagich { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 12px; }
        .son-tugma { background: #ffb347; border: none; width: 32px; height: 32px; border-radius: 40px; font-size: 1.2rem; font-weight: bold; color: #000; cursor: pointer; }
        .son-qiymat { font-size: 1.2rem; font-weight: 600; min-width: 32px; }
        .savat-qism { background: rgba(0,0,0,0.5); backdrop-filter: blur(16px); border-radius: 32px; padding: 20px; margin-top: 8px; }
        .savat-sarlavha { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .savat-mahsulotlar { max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
        .savat-mahsulot { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .savat-boshqaruv { display: flex; gap: 10px; align-items: center; }
        .savat-tugma { background: rgba(255,255,255,0.2); border: none; width: 28px; height: 28px; border-radius: 30px; color: white; cursor: pointer; }
        .jami { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 12px; margin-top: 12px; font-weight: bold; }
        .jami-miqdor { color: #ffb347; font-size: 1.3rem; }
        .kiritish-guruhi { margin: 16px 0; }
        input, textarea { width: 100%; padding: 12px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .tugma { width: 100%; padding: 14px; border-radius: 50px; background: #ffb347; color: #000; font-weight: bold; border: none; margin-top: 10px; cursor: pointer; }
        .bosh-savat { text-align: center; opacity: 0.6; padding: 20px; }
        footer { text-align: center; font-size: 0.6rem; opacity: 0.5; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sarlavha">
        <div class="logo">🛍️✨</div>
        <div class="nomi">DWEN MARKET</div>
        <div class="tagline">Faqat sifatli mahsulotlar</div>
    </div>

    <div class="mahsulotlar-tarmoq" id="mahsulotlarTarmoq"></div>

    <div class="savat-qism">
        <div class="savat-sarlavha">🛒 Savatcha</div>
        <div class="savat-mahsulotlar" id="savatMahsulotlar"><div class="bosh-savat">Bo'sh</div></div>
        <div class="jami"><span>💰 Jami</span><span class="jami-miqdor" id="jamiMiqdor">0 so'm</span></div>

        <button id="joylashuvTugmasi" class="tugma">📍 Joylashuvni ulashish</button>
        <div class="kiritish-guruhi"><label>📞 Telefon</label><input type="tel" id="telefon" placeholder="+998 __ ___ __ __"></div>
        <div class="kiritish-guruhi"><label>📍 Manzil</label><textarea id="manzil" rows="2" placeholder="Ko'cha, uy, tuman..."></textarea></div>
        <button id="buyurtmaTugmasi" class="tugma">✅ Buyurtma berish</button>
    </div>
    <footer>Dwen Market 2026</footer>

    <script>
        // ========= MAHSULOTLAR (o‘zbekcha nomlar) =========
        const MAHSULOTLAR = {
            "🥔 Kartoshka": { narxi: 7000, emoji: "🥔" },
            "🧅 Piyoz": { narxi: 2000, emoji: "🧅" },
            "🥕 Sabzi qizil": { narxi: 4000, emoji: "🥕" },
            "🥕 Sabzi sariq": { narxi: 3300, emoji: "🥕" },
            "🍚 Guruch Xorazm Lazer": { narxi: 14000, emoji: "🍚" },
            "🍚 Guruch Rishton Lazer": { narxi: 13000, emoji: "🍚" },
            "🧂 Tuz Roxat": { narxi: 5000, emoji: "🧂" },
            "🍃 Kok Choy (0.5kg)": { narxi: 20000, emoji: "🍃" },
            "🫒 Donya yog' (5L)": { narxi: 100000, emoji: "🫒" },
            "🫒 Farg'ona yog' (3.6kg)": { narxi: 68000, emoji: "🫒" },
            "🫒 Lazzat yog' (5L)": { narxi: 100000, emoji: "🫒" }
        };

        let savat = {};
        let foydalanuvchiJoylashuvi = null;
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.MainButton.hide();

        // Mahsulotlarni ekranga chiqarish
        function mahsulotlarniKorsat() {
            const quti = document.getElementById('mahsulotlarTarmoq');
            quti.innerHTML = '';
            for (const [nom, malumot] of Object.entries(MAHSULOTLAR)) {
                const xavfsizNom = nom.replace(/[\s\(\)]/g, '');
                quti.innerHTML += `
                    <div class="karta" data-nom="${nom.replace(/'/g, "\\'")}">
                        <div class="mahsulot-emoji">${malumot.emoji}</div>
                        <div class="mahsulot-nomi">${nom}</div>
                        <div class="mahsulot-narxi">${malumot.narxi.toLocaleString()} so'm</div>
                        <div class="son-tanlagich">
                            <button class="son-tugma" data-nom="${nom.replace(/'/g, "\\'")}" data-farq="-1">−</button>
                            <span class="son-qiymat" id="son-${xavfsizNom}">${savat[nom] || 0}</span>
                            <button class="son-tugma" data-nom="${nom.replace(/'/g, "\\'")}" data-farq="1">+</button>
                        </div>
                    </div>
                `;
            }
            document.querySelectorAll('.son-tugma').forEach(tugma => {
                tugma.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const nom = tugma.getAttribute('data-nom');
                    const farq = parseInt(tugma.getAttribute('data-farq'));
                    miqdorniOzgartir(nom, farq);
                });
            });
            document.querySelectorAll('.karta').forEach(karta => {
                karta.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        const nom = karta.getAttribute('data-nom');
                        miqdorniOzgartir(nom, 1);
                    }
                });
            });
        }

        function miqdorniOzgartir(nom, farq) {
            let joriy = savat[nom] || 0;
            let yangi = joriy + farq;
            if (yangi < 0) yangi = 0;
            if (yangi === 0) delete savat[nom];
            else savat[nom] = yangi;
            const xavfsizNom = nom.replace(/[\s\(\)]/g, '');
            const span = document.getElementById(`son-${xavfsizNom}`);
            if (span) span.innerText = savat[nom] || 0;
            savatniYangila();
        }

        function savatniYangila() {
            const quti = document.getElementById('savatMahsulotlar');
            let jami = 0;
            if (Object.keys(savat).length === 0) {
                quti.innerHTML = '<div class="bosh-savat">Savatcha bo\'sh</div>';
                document.getElementById('jamiMiqdor').innerText = '0 so\'m';
                return;
            }
            quti.innerHTML = '';
            for (const [nom, miqdor] of Object.entries(savat)) {
                const summa = MAHSULOTLAR[nom].narxi * miqdor;
                jami += summa;
                quti.innerHTML += `
                    <div class="savat-mahsulot">
                        <div><span>${MAHSULOTLAR[nom].emoji}</span> ${nom} x${miqdor}</div>
                        <div class="savat-boshqaruv">
                            <span>${summa.toLocaleString()} so'm</span>
                            <button class="savat-tugma" data-nom="${nom.replace(/'/g, "\\'")}" data-farq="-1">−</button>
                            <button class="savat-tugma" data-nom="${nom.replace(/'/g, "\\'")}" data-farq="1">+</button>
                        </div>
                    </div>
                `;
            }
            document.getElementById('jamiMiqdor').innerText = jami.toLocaleString() + ' so\'m';
            document.querySelectorAll('.savat-tugma').forEach(tugma => {
                tugma.addEventListener('click', (e) => {
                    const nom = tugma.getAttribute('data-nom');
                    const farq = parseInt(tugma.getAttribute('data-farq'));
                    miqdorniOzgartir(nom, farq);
                });
            });
        }

        // Joylashuvni olish
        document.getElementById('joylashuvTugmasi').onclick = () => {
            if (!navigator.geolocation) {
                tg.showPopup({ title: "Xatolik", message: "Brauzeringiz joylashuvni qo'llab-quvvatlamaydi." });
                return;
            }
            navigator.geolocation.getCurrentPosition((pozitsiya) => {
                foydalanuvchiJoylashuvi = { lat: pozitsiya.coords.latitude, lon: pozitsiya.coords.longitude };
                tg.showPopup({ title: "✅ Joylashuv ulashildi", message: "Yetkazib berish masofasi hisoblanadi." });
                document.getElementById('joylashuvTugmasi').style.display = 'none';
            }, () => {
                tg.showPopup({ title: "Xatolik", message: "Joylashuvga ruxsat bermadingiz." });
            });
        };

        // Buyurtma yuborish
        async function buyurtmaYubor() {
            const telefon = document.getElementById('telefon').value.trim();
            const manzil = document.getElementById('manzil').value.trim();
            if (Object.keys(savat).length === 0) {
                tg.showPopup({ title: "Xatolik", message: "Mahsulot tanlang!" });
                return;
            }
            if (!telefon || telefon.length < 9) {
                tg.showPopup({ title: "Xatolik", message: "Telefon raqamni kiriting!" });
                return;
            }
            if (!manzil || manzil.length < 5) {
                tg.showPopup({ title: "Xatolik", message: "Manzilni kiriting!" });
                return;
            }

            let jami = 0;
            const savatMassivi = [];
            for (const [nom, miqdor] of Object.entries(savat)) {
                const narxi = MAHSULOTLAR[nom].narxi;
                const summa = narxi * miqdor;
                jami += summa;
                savatMassivi.push({ nom, miqdor, narxi, summa });
            }

            const buyurtmaMalumoti = {
                savat: savatMassivi,
                jami: jami,
                telefon: telefon,
                manzil: manzil,
                joylashuv: foydalanuvchiJoylashuvi,
                sana: new Date().toLocaleString()
            };
            tg.MainButton.showProgress();
            tg.sendData(JSON.stringify(buyurtmaMalumoti));
            tg.showPopup({ title: "✅ Buyurtma qabul qilindi!", message: "Operator tez orada bog'lanadi." });
            tg.MainButton.hideProgress();
            tg.close();
        }
        document.getElementById('buyurtmaTugmasi').onclick = buyurtmaYubor;
        mahsulotlarniKorsat();
        savatniYangila();
    </script>
</body>
</html>
